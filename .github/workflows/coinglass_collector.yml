name: Coinglass Collector

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - run: |
        pip install playwright openpyxl filelock requests
        playwright install chromium
        playwright install-deps
    
    - run: python -c "from openpyxl import Workbook; Workbook().save('Trading_Journal.xlsx')" 2>/dev/null || true
    
    - run: python coinglass_collector_part1.py || true
    - run: sleep 120
    - run: python coinglass_collector_part2.py || true
    - run: sleep 120
    - run: python coinglass_collector_part3.py || true
    - run: sleep 120
    - run: python coinglass_collector_part4.py || true
    - run: python swing_checker.py || true
    
    - name: Commit and Push Results
      run: |
        git config user.name "Trading Bot"
        git config user.email "bot@github.com"
        git add *.xlsx
        git diff --staged --quiet || git commit -m "📊 Data updated: $(date +'%Y-%m-%d %H:%M:%S')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/upload-artifact@v4
      with:
        name: trading-data
        path: |
          Trading_Journal.xlsx
          swing_candidates.xlsx
        retention-days: 7
