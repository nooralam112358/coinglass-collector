name: Coinglass Collector

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - run: |
        pip install playwright openpyxl filelock requests google-auth google-auth-oauthlib google-api-python-client
        playwright install chromium
        playwright install-deps
    
    - run: python -c "from openpyxl import Workbook; Workbook().save('Trading_Journal.xlsx')" 2>/dev/null || true
    
    - run: python coinglass_collector_part1.py || true
    - run: sleep 120
    - run: python coinglass_collector_part2.py || true
    - run: sleep 120
    - run: python coinglass_collector_part3.py || true
    - run: sleep 120
    - run: python coinglass_collector_part4.py || true
    - run: python swing_checker.py || true
    
    - run: python google_drive_uploader.py
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
