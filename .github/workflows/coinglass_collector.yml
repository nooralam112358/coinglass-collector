name: Coinglass Collector

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Dhaka
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install playwright openpyxl filelock requests
        playwright install chromium
        playwright install-deps
    
    - name: Ensure Excel file exists
      run: |
        if [ ! -f "Trading_Journal.xlsx" ]; then
          python -c "from openpyxl import Workbook; Workbook().save('Trading_Journal.xlsx')"
        fi
    
    - name: Part 1 - BTC, SOL, XRP, ADA, AVAX, DOT, NEAR, BCH
      run: python coinglass_collector_part1.py || true
    
    - name: Wait 2 minutes
      run: sleep 120
    
    - name: Part 2 - SUI, ENA, WLD, ONDO, ETC, ARB, INJ, TIA
      run: python coinglass_collector_part2.py || true
    
    - name: Wait 2 minutes
      run: sleep 120
    
    - name: Part 3 - AR, ATOM, HBAR, SEI, VET, ZEC, DEXE, AAVE
      run: python coinglass_collector_part3.py || true
    
    - name: Wait 2 minutes
      run: sleep 120
    
    - name: Part 4 - UNI, HYPE, TAO, DOT, NEAR, FET, BCH, LTC, LINK, RENDER, BNB
      run: python coinglass_collector_part4.py || true
    
    - name: Commit and Push Results
      run: |
        git config user.name "Trading Bot"
        git config user.email "bot@github.com"
        git add *.xlsx
        git diff --staged --quiet || git commit -m "📊 Data updated: $(date +'%Y-%m-%d %H:%M:%S')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trading-data
        path: |
          Trading_Journal.xlsx
        retention-days: 7
